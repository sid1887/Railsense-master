version: '3.8'

services:
  railsense:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: railsense
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:3000
      # OpenWeatherMap API Key (set in .env.production)
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY:-demo}
      # Database configuration
      - DATABASE_PATH=/app/data/railsense.db
    volumes:
      # Persist database between restarts
      - railsense_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/train-analytics?trainNumber=12955"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - railsense_network

  # Optional: Add nginx reverse proxy for production
  nginx:
    image: nginx:alpine
    container_name: railsense_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - railsense
    restart: unless-stopped
    networks:
      - railsense_network
    profiles:
      - "with-nginx"

volumes:
  railsense_data:
    driver: local

networks:
  railsense_network:
    driver: bridge
